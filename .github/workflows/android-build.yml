name: Build StS2 Launcher APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------
      # .NET
      # -------------------------

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install CSharpier
        run: |
          dotnet tool install -g csharpier
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      # -------------------------
      # Godot
      # -------------------------

      - name: Install Godot dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            unzip \
            libfontconfig1 \
            libx11-6 \
            libxcursor1

      - name: Download Godot Mono
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_mono_linux_x86_64.zip
          unzip Godot_v4.3-stable_mono_linux_x86_64.zip
          chmod +x Godot_v4.3-stable_mono_linux_x86_64/Godot_v4.3-stable_mono_linux.x86_64

      - name: Build Godot C# solution
        run: |
          ./Godot_v4.3-stable_mono_linux_x86_64/Godot_v4.3-stable_mono_linux.x86_64 \
          --headless \
          --build-solutions \
          --quit

      # -------------------------
      # Android SDK
      # -------------------------

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"
          sdkmanager "ndk;28.1.13356709"

      # -------------------------
      # Run project build script
      # -------------------------

      - name: Run build script
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh

      # -------------------------
      # Build APK
      # -------------------------

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # -------------------------
      # Upload APK
      # -------------------------

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StS2-Launcher-APK
          path: android/**/build/outputs/apk/**/*.apk
