name: Build StS2-Launcher Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4

      # =========================
      # 2. JDK 17 (필수 고정)
      # =========================
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # 3. Android SDK
      # =========================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --licenses || true
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"
          sdkmanager "ndk;28.1.13356709"

      # =========================
      # 4. Gradle cache (속도 개선)
      # =========================
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      # =========================
      # 5. Gradle 권한
      # =========================
      - name: Make gradlew executable (fallback safe)
        run: |
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
          fi

      # =========================
      # 6. Gradle wrapper 없을 때 fallback
      # =========================
      - name: Build APK (robust mode)
        run: |
          cd android

          # wrapper 있으면 사용
          if [ -f "./gradlew" ]; then
            echo "Using Gradle Wrapper"
            ./gradlew clean assembleDebug --stacktrace
          else
            echo "Gradle Wrapper missing → using system gradle"
            gradle clean assembleDebug --stacktrace
          fi

      # =========================
      # 7. APK 업로드
      # =========================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StS2-Launcher-APK
          path: |
            android/**/build/outputs/apk/**/*.apk
