name: Build Android

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_mono_linux_x86_64.zip
          unzip Godot_v4.2.2-stable_mono_linux_x86_64.zip
          chmod +x Godot_v4.2.2-stable_mono_linux.x86_64

      - name: Install Android Build Template
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip Godot_v4.2.2-stable_export_templates.tpz -d templates
          mv templates/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Build C# project
        run: dotnet build src/STS2Mobile/STS2Mobile.csproj

      - name: Export Android
        run: |
          ./Godot_v4.2.2-stable_mono_linux.x86_64 \
            --headless \
            --export-release Android build.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build.apk
