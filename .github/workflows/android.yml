name: Build Android

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Android workload
        run: dotnet workload install android

      - name: Restore
        run: dotnet restore src/STS2Mobile/STS2Mobile.csproj

      - name: Build
        run: dotnet build src/STS2Mobile/STS2Mobile.csproj -c Release

      - name: Publish
        run: dotnet publish src/STS2Mobile/STS2Mobile.csproj -c Release -f net8.0-android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            src/STS2Mobile/bin/Release/**/*
