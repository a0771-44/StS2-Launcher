name: Build Android

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          
      - name: Setup Godot
        run: |
          mkdir -p ~/godot_bin
          cd ~/godot_bin
          for i in {1..3}; do
            wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_mono_linux_headless.64.zip && break
            echo "Download attempt $i failed, retrying..."
            sleep 30
          done
          unzip -q Godot_v4.2.2-stable_mono_linux_headless.64.zip
          chmod +x Godot_v4.2.2-stable_mono_linux_headless.64
          echo "$HOME/godot_bin" >> $GITHUB_PATH
          ln -s Godot_v4.2.2-stable_mono_linux_headless.64 godot

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android Build Template
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.mono.stable
          wget https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_mono_export_templates.tpz
          unzip Godot_v4.2.2-stable_mono_export_templates.tpz -d templates
          mv templates/templates/* ~/.local/share/godot/export_templates/4.2.2.mono.stable/

      - name: Build C# project
        run: dotnet build src/STS2Mobile/STS2Mobile.csproj

      - name: Export Android
        run: |
          godot \
            --headless \
            --export-release Android build.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build.apk
